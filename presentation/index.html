<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Tracking - Thunderstorm Prediction for Switzerland</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/theme/white.css" id="theme">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/highlight/monokai.css">

    <style>
        .reveal {
            font-size: 28px;
        }

        .reveal h1 {
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 0.3em;
        }

        .reveal h2 {
            font-size: 1.5em;
            color: #34495e;
            margin-bottom: 0.5em;
        }

        .reveal h3 {
            font-size: 1.15em;
            color: #546e7a;
            margin-bottom: 0.3em;
        }

        .reveal pre {
            font-size: 0.55em;
            line-height: 1.4;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.15);
        }

        .reveal ul, .reveal ol {
            margin: 0.3em 0;
        }

        .reveal li {
            margin: 0.2em 0;
            line-height: 1.4;
        }

        .reveal p {
            margin: 0.3em 0;
        }

        .reveal .emphasis {
            color: #e74c3c;
            font-weight: bold;
        }

        .reveal .key-term {
            color: #3498db;
            font-weight: bold;
        }

        .reveal .columns {
            display: flex;
            gap: 1.5em;
        }

        .reveal .column {
            flex: 1;
        }

        .reveal .small {
            font-size: 0.7em;
            color: #7f8c8d;
        }

        .reveal .progress {
            background: rgba(52, 152, 219, 0.2);
        }

        .reveal .progress span {
            background: #3498db;
        }

        .reveal section.title-slide {
            background: linear-gradient(135deg, #1a5276 0%, #2980b9 100%);
            color: white;
        }

        .reveal section.title-slide h1,
        .reveal section.title-slide h2,
        .reveal section.title-slide h3,
        .reveal section.title-slide p {
            color: white;
        }

        .reveal .mermaid svg {
            max-height: 400px;
            max-width: 100%;
        }

        .reveal table {
            font-size: 0.75em;
        }

        .reveal table th, .reveal table td {
            padding: 0.3em 0.6em;
        }

        .reveal blockquote {
            font-size: 0.85em;
            font-style: italic;
            border-left: 4px solid #3498db;
            padding-left: 1em;
            background: rgba(52, 152, 219, 0.05);
        }

        .reveal .slide-content {
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <section data-markdown="slides.md"
                     data-separator="^\n---\n$"
                     data-separator-vertical="^\n----\n$"
                     data-separator-notes="^Note:">
            </section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/highlight/highlight.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/notes/notes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/zoom/zoom.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose',
            themeVariables: {
                primaryColor: '#3498db',
                primaryTextColor: '#2c3e50',
                primaryBorderColor: '#2980b9',
                lineColor: '#34495e',
                secondaryColor: '#95a5a6',
                tertiaryColor: '#ecf0f1'
            }
        });

        // Convert markdown code blocks to mermaid divs after Reveal renders
        function convertMermaidBlocks() {
            document.querySelectorAll('code.language-mermaid, code.mermaid').forEach(function(code) {
                var pre = code.parentElement;
                var div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = code.textContent;
                pre.parentElement.replaceChild(div, pre);
            });
        }

        Reveal.initialize({
            hash: true,
            center: true,
            progress: true,
            slideNumber: 'c/t',
            showSlideNumber: 'all',
            transition: 'slide',
            plugins: [
                RevealMarkdown,
                RevealHighlight,
                RevealNotes,
                RevealZoom
            ]
        }).then(function() {
            convertMermaidBlocks();
            mermaid.run({ querySelector: '.mermaid' });
        });
    </script>
</body>
</html>
